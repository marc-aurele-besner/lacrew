name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-git
      - name: Install OpenZeppelin
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.3.0 --no-git
      - name: Build
        run: forge build
      - name: Test
        run: forge test
      # Pip slither (latest crytic-compile) — the docker action's bundled
      # crytic-compile cannot parse current Foundry build-info output.
      - name: Install Slither
        run: pipx install slither-analyzer
      - name: Slither
        run: slither . --fail-high --filter-paths "lib/"

  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install contract deps
        working-directory: contracts
        run: |
          forge install foundry-rs/forge-std --no-git
          forge install OpenZeppelin/openzeppelin-contracts@v5.3.0 --no-git
          forge build
      # No version input: pnpm/action-setup reads the packageManager field,
      # and specifying both (when they differ) is an error.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @lacrew/core sync-abis
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
